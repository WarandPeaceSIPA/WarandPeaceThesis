<!-- Theme Toggle Button Component -->
<!-- Insert this before closing </body> tag on all pages -->

<!-- Theme Toggle Button -->
<button id="theme-toggle" 
        onclick="window.themeManager.toggle()" 
        aria-label="Toggle theme"
        title="Toggle light/dark mode"
        class="theme-toggle-btn">
    <!-- Sun Icon (for dark mode - click to go light) -->
    <i id="sun-icon" class="fas fa-sun"></i>
    <!-- Moon Icon (for light mode - click to go dark) -->
    <i id="moon-icon" class="fas fa-moon hidden"></i>
</button>

<!-- Theme Switcher Script -->
<script src="theme-switcher.js"></script>

<style>
/* Theme Toggle Button Styles - Embedded for immediate loading */
.theme-toggle-btn {
    position: fixed;
    top: 100px;
    right: 20px;
    z-index: 1000;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background-color: var(--bg-card, #1e293b);
    border: 2px solid var(--border-primary, #374151);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

.theme-toggle-btn:hover {
    transform: scale(1.1) rotate(15deg);
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
}

.theme-toggle-btn:active {
    transform: scale(0.95);
}

.theme-toggle-btn i {
    font-size: 1.5rem;
    transition: all 0.3s ease;
}

#sun-icon {
    color: #facc15;
}

#moon-icon {
    color: #3b82f6;
}

.hidden {
    display: none !important;
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .theme-toggle-btn {
        top: 80px;
        right: 15px;
        width: 45px;
        height: 45px;
    }
    
    .theme-toggle-btn i {
        font-size: 1.25rem;
    }
}

/* Accessibility */
.theme-toggle-btn:focus-visible {
    outline: 3px solid #a855f7;
    outline-offset: 2px;
}
</style>
